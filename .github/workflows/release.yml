name: Release

on:
  push:
    branches: ["master"]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  DEFMT_LOG: info

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6

      - name: Install Rust
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: thumbv7em-none-eabihf

      - name: Cache Cargo
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Build release firmware
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: cargo build --locked --release --no-default-features --features stm32f401re

      - name: Package firmware artifacts
        id: package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          set -euo pipefail
          elf="target/thumbv7em-none-eabihf/release/stm32-embassy-template"
          version="${{ steps.release.outputs.tag_name }}"
          host="$(rustc -vV | sed -n 's/^host: //p')"
          objcopy="$(rustc --print sysroot)/lib/rustlib/${host}/bin/llvm-objcopy"
          elf_name="firmware-stm32f401re-${version}.elf"
          bin_name="firmware-stm32f401re-${version}.bin"
          cp "${elf}" "${elf_name}"
          "${objcopy}" -O binary "${elf}" "${bin_name}"
          {
            echo "elf_name=${elf_name}"
            echo "bin_name=${bin_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-stm32f401re-${{ steps.release.outputs.tag_name }}
          path: |
            ${{ steps.package.outputs.elf_name }}
            ${{ steps.package.outputs.bin_name }}
          if-no-files-found: error

      - name: Attach firmware to GitHub release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          files: |
            ${{ steps.package.outputs.elf_name }}
            ${{ steps.package.outputs.bin_name }}
