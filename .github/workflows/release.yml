name: Release

on:
  push:
    branches: ["master"]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  DEFMT_LOG: info

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6

      - name: Install Rust
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: thumbv7em-none-eabihf

      - name: Cache Cargo
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Build release firmware
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: cargo build --locked --release --no-default-features --features stm32f401re

      - name: Package firmware artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          set -euo pipefail
          elf="target/thumbv7em-none-eabihf/release/stm32-embassy-template"
          host="$(rustc -vV | sed -n 's/^host: //p')"
          objcopy="$(rustc --print sysroot)/lib/rustlib/${host}/bin/llvm-objcopy"
          cp "${elf}" firmware-stm32f401re.elf
          "${objcopy}" -O binary "${elf}" firmware-stm32f401re.bin

      - name: Upload firmware artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="v$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          gh release upload "${RELEASE_TAG}" firmware-stm32f401re.elf firmware-stm32f401re.bin --clobber

